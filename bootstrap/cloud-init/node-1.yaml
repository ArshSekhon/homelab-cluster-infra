#cloud-config
hostname: "node-1"
fqdn: "node-1.cluster.arpa"
manage_etc_hosts: true

users:
  - name: kadmin
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_import_id:
      - gh:arshsekhon

package_update: true
packages:
  - curl
  - jq
  - nfs-common
  - open-iscsi
  - qemu-guest-agent

write_files:
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
      iscsi_tcp
  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables=1
      net.bridge.bridge-nf-call-ip6tables=1
      net.ipv4.ip_forward=1

runcmd:
  - modprobe overlay
  - modprobe br_netfilter
  - modprobe iscsi_tcp
  - sysctl --system
  - swapoff -a
  - sed -i '/swap/d' /etc/fstab
  - systemctl enable --now systemd-timesyncd

power_state:
  mode: reboot
  message: "cloud-init complete, rebooting"
  condition: true
