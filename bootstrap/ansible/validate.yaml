---
# validate.yaml — Post-bootstrap cluster validation
#
# Runs smoke tests from the operator workstation against the k3s cluster
# using the exported kubeconfig.
#
# Usage:
#   ansible-playbook validate.yaml
#
# Override kubeconfig path:
#   ansible-playbook validate.yaml -e kubeconfig_path=/path/to/kubeconfig
#
# Requirements: 2.6, 2.8

- name: Validate k3s cluster health
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - cluster_smoke_tests
