---
# base_hardening/tasks/main.yaml
# Idempotent OS hardening — verifies and remediates the baseline set by cloud-init.
# Requirements: 2.2

# -----------------------------------------------------------------------
# 1. Packages
# -----------------------------------------------------------------------
- name: Install required baseline packages
  ansible.builtin.apt:
    name: "{{ hardening_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

# -----------------------------------------------------------------------
# 2. Kernel modules — persist and load
# -----------------------------------------------------------------------
- name: Persist kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      {% for mod in hardening_kernel_modules %}
      {{ mod }}
      {% endfor %}
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Load kernel modules immediately
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ hardening_kernel_modules }}"
  become: true

# -----------------------------------------------------------------------
# 3. Sysctl settings
# -----------------------------------------------------------------------
- name: Apply required sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
    state: present
  loop: "{{ hardening_sysctls | dict2items }}"
  become: true

# -----------------------------------------------------------------------
# 4. Swap — must be disabled for Kubernetes
# -----------------------------------------------------------------------
- name: Disable swap at runtime
  ansible.builtin.command: swapoff -a
  changed_when: false
  become: true

- name: Remove swap entries from fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent
  become: true

# -----------------------------------------------------------------------
# 5. Time synchronisation
# -----------------------------------------------------------------------
- name: Enable and start systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  become: true
