---
# k3s_server_join/tasks/main.yaml
# Joins an additional k3s server node to the existing cluster.
# Requirements: 2.4

# -----------------------------------------------------------------------
# 1. Fetch cluster token from init node via API VIP
# -----------------------------------------------------------------------
- name: Fetch node token from init node
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: _remote_token
  delegate_to: node-0
  become: true

- name: Set join token fact
  ansible.builtin.set_fact:
    _join_token: "{{ _remote_token.content | b64decode | trim }}"

- name: Fail if no cluster token is available
  ansible.builtin.fail:
    msg: >-
      No cluster token available. Ensure k3s_server_init has been run on
      the init node first.
  when: _join_token | length == 0

# -----------------------------------------------------------------------
# 2. Install k3s — join existing cluster via VIP
# -----------------------------------------------------------------------
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Check installed k3s version
  ansible.builtin.command: k3s --version
  register: k3s_installed_version
  changed_when: false
  failed_when: false
  when: k3s_binary.stat.exists

- name: Download k3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_url }}"
    dest: /tmp/k3s-install.sh
    mode: "0755"
  become: true
  when: >
    not k3s_binary.stat.exists or
    (k3s_installed_version.stdout is defined and k3s_version not in k3s_installed_version.stdout)

- name: Install k3s as join server
  ansible.builtin.command:
    cmd: /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: >-
      server
      --server=https://{{ api_server_vip }}:{{ api_server_port }}
      --token={{ _join_token }}
      --tls-san={{ api_server_vip }}
      --disable={{ disable_components | join(',') }}
      --etcd-snapshot-schedule-cron={{ etcd_snapshot_schedule | quote }}
      --etcd-snapshot-retention={{ etcd_snapshot_retention }}
      --etcd-snapshot-dir={{ etcd_snapshot_dir }}
  become: true
  when: >
    not k3s_binary.stat.exists or
    (k3s_installed_version.stdout is defined and k3s_version not in k3s_installed_version.stdout)
  notify: restart k3s

# -----------------------------------------------------------------------
# 3. Ensure k3s service is enabled and running
# -----------------------------------------------------------------------
- name: Enable and start k3s service
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true
  become: true

# -----------------------------------------------------------------------
# 4. Wait for node to join and report Ready
# -----------------------------------------------------------------------
- name: Wait for k3s service to be active
  ansible.builtin.systemd:
    name: k3s
  register: k3s_service
  until: k3s_service.status.ActiveState == "active"
  retries: "{{ k3s_ready_retries }}"
  delay: "{{ k3s_ready_delay }}"
  become: true

- name: Wait for node to join and report Ready
  ansible.builtin.command:
    cmd: k3s kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: node_ready
  until: node_ready.stdout == "True"
  retries: "{{ k3s_ready_retries }}"
  delay: "{{ k3s_ready_delay }}"
  changed_when: false
  become: true
