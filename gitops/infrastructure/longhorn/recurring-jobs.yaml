---
# Daily snapshot job — retain 7 snapshots
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-daily
  namespace: longhorn-system
spec:
  name: snapshot-daily
  task: snapshot
  cron: "0 2 * * *"
  retain: 7
  concurrency: 2
  labels:
    schedule: daily
---
# Weekly backup job — runs only when a backup target is configured.
# If no backup target is set in Longhorn settings, the job will be
# created but backups will fail gracefully with an event/alert.
# To skip creation entirely, remove this resource or gate it via
# Kustomize patch when backup_s3_endpoint is empty.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-weekly
  namespace: longhorn-system
spec:
  name: backup-weekly
  task: backup
  cron: "0 4 * * 0"
  retain: 4
  concurrency: 1
  labels:
    schedule: weekly
