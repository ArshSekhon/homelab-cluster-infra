---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 10m
  chart:
    spec:
      chart: longhorn
      version: "1.7.*"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    defaultSettings:
      # Disk reservation threshold — prevents scheduling when disk is >75% full
      storageMinimalAvailablePercentage: "25"
      # Default replica count for volumes without explicit StorageClass override
      defaultReplicaCount: 2
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      defaultFsType: ext4
      reclaimPolicy: Delete
      defaultDataLocality: disabled
      defaultStaleReplicaTimeout: "2880"
      recurringJobSelector:
        enable: true
        jobList:
          - '{"name":"snapshot-daily","isGroup":false}'
          - '{"name":"backup-weekly","isGroup":false}'
    ingress:
      enabled: true
      host: longhorn.cluster.arpa
      ingressClassName: nginx
      tls: true
      tlsSecret: longhorn-tls
      annotations:
        cert-manager.io/cluster-issuer: internal-ca
    longhornManager:
      nodeSelector:
        kubernetes.io/os: linux
    longhornDriver:
      nodeSelector:
        kubernetes.io/os: linux
