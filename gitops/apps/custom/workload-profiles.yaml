---
# Workload profile: custom-app
# For general-purpose custom applications
apiVersion: v1
kind: ConfigMap
metadata:
  name: workload-profile-custom-app
  namespace: apps
  labels:
    app.kubernetes.io/part-of: apps
    app.kubernetes.io/component: workload-profile
    workload-profile: custom-app
data:
  cpu-request: "100m"
  cpu-limit: "500m"
  memory-request: "128Mi"
  memory-limit: "512Mi"
  liveness-probe: |
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness-probe: |
    httpGet:
      path: /readyz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  pdb-min-available: "1"
