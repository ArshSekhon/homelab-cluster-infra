---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-issuers
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: gitops/infrastructure/cert-manager-issuers
  prune: true
  wait: true
  dependsOn:
    - name: platform-core
  decryption:
    provider: sops
    secretRef:
      name: sops-age
