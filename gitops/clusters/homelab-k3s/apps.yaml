---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: gitops/apps/
  prune: true
  wait: true
  dependsOn:
    - name: data-services
    - name: observability
  decryption:
    provider: sops
    secretRef:
      name: sops-age
