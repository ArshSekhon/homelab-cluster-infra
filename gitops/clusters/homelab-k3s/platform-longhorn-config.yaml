---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-longhorn-config
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: gitops/infrastructure/longhorn-config
  prune: true
  wait: true
  dependsOn:
    - name: storage
  decryption:
    provider: sops
    secretRef:
      name: sops-age
