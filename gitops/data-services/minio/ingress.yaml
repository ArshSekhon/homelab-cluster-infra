---
# MinIO S3 API ingress — s3.cluster.arpa
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-s3-api
  namespace: data-system
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: data-services
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - s3.cluster.arpa
      secretName: minio-s3-tls
  rules:
    - host: s3.cluster.arpa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 80
---
# MinIO Console ingress — minio.cluster.arpa
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console
  namespace: data-system
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: data-services
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - minio.cluster.arpa
      secretName: minio-console-tls
  rules:
    - host: minio.cluster.arpa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-console
                port:
                  number: 9090
