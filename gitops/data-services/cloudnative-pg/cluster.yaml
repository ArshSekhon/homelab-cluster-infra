---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: data-system
spec:
  description: "Homelab HA PostgreSQL cluster — 1 primary + 2 replicas"
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  instances: 3

  # Primary is updated first, then replicas
  primaryUpdateStrategy: unsupervised

  storage:
    storageClass: longhorn-critical
    size: 10Gi

  walStorage:
    storageClass: longhorn-critical
    size: 2Gi

  # Spread instances across nodes for HA
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required

  # Automatic failover on primary failure
  failoverDelay: 0

  # Resource requests/limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  # PostgreSQL configuration
  postgresql:
    parameters:
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      max_connections: "100"
      wal_level: "replica"

  # Backup configuration — continuous WAL archiving to off-cluster S3
  # Conditional: only effective when backup target is configured.
  # If no backup target is available, remove or comment out this section
  # and exclude scheduled-backup.yaml from kustomization.yaml.
  backup:
    barmanObjectStore:
      destinationPath: "s3://cnpg-backups/"
      endpointURL: "${BACKUP_S3_ENDPOINT}"
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-creds
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
    retentionPolicy: "14d"
