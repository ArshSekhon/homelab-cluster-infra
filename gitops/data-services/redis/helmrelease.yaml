---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: data-system
spec:
  interval: 10m
  chart:
    spec:
      chart: redis
      version: "20.*"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    architecture: replication
    sentinel:
      enabled: true
      masterSet: mymaster
      quorum: 2
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
    master:
      persistence:
        enabled: true
        storageClass: longhorn
        size: 2Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
    replica:
      replicaCount: 2
      persistence:
        enabled: true
        storageClass: longhorn
        size: 2Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
    auth:
      enabled: true
      existingSecret: redis-auth
      existingSecretPasswordKey: redis-password
    metrics:
      enabled: true
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
